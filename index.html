<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LathePro — Amar Furniture</title>
<meta name="theme-color" content="#f5f0e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LathePro">
<link rel="manifest" href="manifest.json" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg:#f5f0e8; --surface:#ffffff; --surface2:#faf7f2; --surface3:#f0ebe0;
  --border:#e2d9c8; --border2:#c8bc9e;
  --gold:#9a6e2e; --gold2:#b8882e; --gold-bg:#fdf3df; --gold-light:#f5e8c8;
  --text:#2a1f0e; --text2:#6b5535; --text3:#9e8460;
  --red:#c0392b; --red-bg:#fdf0ee; --green:#2e7d52;
  --radius:8px; --radius-lg:12px;
  --shadow:0 2px 12px rgba(60,40,10,0.08); --shadow-lg:0 4px 24px rgba(60,40,10,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.screen{display:none;min-height:100vh;} .screen.active{display:flex;flex-direction:column;}

/* PIN */
#pin-screen{align-items:center;justify-content:center;background:linear-gradient(135deg,#fdf8ef,#f0e8d0);}
.pin-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 36px;width:320px;text-align:center;box-shadow:var(--shadow-lg);}
.pin-logo{font-family:'Playfair Display',serif;font-size:30px;color:var(--gold);letter-spacing:1px;margin-bottom:3px;}
.pin-sub{color:var(--text3);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:28px;}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .2s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(154,110,46,.3);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pin-key{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Mono',monospace;font-size:20px;padding:14px;cursor:pointer;transition:all .15s;}
.pin-key:hover{background:var(--gold-light);border-color:var(--gold);} .pin-key:active{transform:scale(.95);}
.pin-key.del{font-size:15px;color:var(--text2);}
.pin-error{color:var(--red);font-size:12px;margin-top:14px;min-height:18px;}

/* HEADER */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(60,40,10,.06);}
.header-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.version-tag{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.header-actions{display:flex;gap:8px;align-items:center;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
.btn-gold{background:var(--gold);color:#fff;} .btn-gold:hover{background:var(--gold2);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-bg);}
.btn-danger{background:transparent;border:1px solid #e8c0bc;color:var(--red);}
.btn-danger:hover{background:var(--red-bg);}
.btn-sm{padding:5px 11px;font-size:12px;} .btn-icon{padding:7px;width:34px;height:34px;justify-content:center;}

/* LIST */
#list-screen{background:var(--bg);}
.list-body{flex:1;padding:20px;max-width:720px;margin:0 auto;width:100%;}
.list-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.list-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);}
.quote-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.quote-card:hover{border-color:var(--gold);box-shadow:var(--shadow-lg);}
.quote-card-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:1px;}
.quote-card-name{font-size:15px;font-weight:500;color:var(--text);margin-top:2px;}
.quote-card-date{font-size:11px;color:var(--text3);margin-top:2px;}
.quote-card-amount{font-family:'DM Mono',monospace;font-size:17px;color:var(--gold2);font-weight:500;text-align:right;}
.quote-card-items{font-size:11px;color:var(--text3);margin-top:2px;text-align:right;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:42px;margin-bottom:12px;} .empty-title{font-size:17px;color:var(--text2);margin-bottom:6px;}

/* BUILDER */
#builder-screen{background:var(--bg);}
.builder-body{flex:1;padding:16px 20px;max-width:1180px;margin:0 auto;width:100%;}
.builder-main{min-width:0;}
.builder-sidebar{min-width:0;}
.builder-sidebar-sticky{position:sticky;top:72px;}
@media (min-width:880px){
  #builder-body-grid{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;}
}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.section-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;} .form-row.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:4px;}
label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;transition:border-color .15s;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);background:var(--gold-bg);}
textarea{resize:vertical;min-height:60px;}

/* ITEM CARD - compact */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
.item-card-header{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--surface3);border-bottom:1px solid var(--border);}
.item-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:1px;font-weight:600;}
.item-card-body{padding:12px 14px;}
.item-row1{display:grid;grid-template-columns:1fr 100px;gap:8px;margin-bottom:8px;}
.item-row2{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:8px;}

/* CALC BAR */
.calc-bar{background:var(--gold-bg);border:1px solid var(--gold-light);border-radius:var(--radius);padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin-bottom:8px;}
.calc-chip{display:flex;align-items:center;gap:4px;font-size:12px;}
.calc-chip-label{color:var(--text3);}
.calc-chip-val{font-family:'DM Mono',monospace;font-weight:500;color:var(--gold2);}
.calc-chip-total{font-size:14px;font-weight:700;color:var(--gold);}
.calc-dv{width:1px;height:14px;background:var(--border2);}

/* PHOTOS */
.photos-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.photo-wrap{position:relative;width:52px;height:52px;}
.photo-wrap img{width:100%;height:100%;object-fit:cover;border-radius:6px;border:1px solid var(--border);}
.photo-remove{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.photo-add-btn{width:52px;height:52px;border-radius:6px;border:2px dashed var(--border2);background:var(--surface2);color:var(--text3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.photo-add-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-bg);}

/* TOTALS */
.totals-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.totals-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border);}
.totals-row:last-child{border-bottom:none;} .totals-row .lbl{color:var(--text2);} .totals-row .val{font-family:'DM Mono',monospace;color:var(--text);}
.totals-grand{display:flex;justify-content:space-between;align-items:center;padding:12px 0 0;margin-top:6px;border-top:2px solid var(--gold-light);}
.totals-grand .lbl{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);}
.totals-grand .val{font-family:'DM Mono',monospace;font-size:20px;color:var(--gold2);font-weight:600;}
.discount-toggle{display:flex;gap:6px;margin-bottom:8px;}
.disc-type-btn{padding:4px 12px;border-radius:16px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;}
.disc-type-btn.active{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;}
.builder-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:40px;}

/* VIEW */
#view-screen{background:var(--bg);}
.view-body{flex:1;padding:20px;max-width:800px;margin:0 auto;width:100%;}
.view-actions{display:flex;gap:6px;flex-wrap:wrap;}
.view-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow);}
.view-table-header{display:grid;grid-template-columns:28px 1fr 80px 50px 80px 80px 80px;background:var(--surface3);border-bottom:2px solid var(--border);padding:8px 12px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;gap:6px;}
.view-table-row{border-bottom:1px solid var(--border);padding:10px 12px;}
.view-table-row:last-child{border-bottom:none;}
.view-row-top{display:grid;grid-template-columns:28px 1fr 80px 50px 80px 80px 80px;align-items:center;gap:6px;font-size:13px;}
.view-row-photos{display:flex;gap:5px;margin-top:8px;padding-left:34px;flex-wrap:wrap;}
.view-row-photos img{width:44px;height:44px;border-radius:5px;object-fit:cover;border:1px solid var(--border);}
.view-row-note{font-size:11px;color:var(--text3);margin-top:4px;padding-left:34px;}
.view-col-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);font-weight:600;}
.view-col-name{font-weight:500;}
.view-col-sub{font-size:11px;color:var(--text3);}
.view-col-r{font-family:'DM Mono',monospace;font-size:12px;text-align:right;}
.view-col-total{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--gold2);text-align:right;}
.view-summary-inline{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);max-width:320px;margin-left:auto;}
.view-terms{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;font-size:11px;color:var(--text3);line-height:1.7;margin-bottom:20px;}

/* SECTION DIVIDER */
.section-divider{display:flex;align-items:center;gap:10px;margin:14px 0 10px;}
.section-divider span{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* DRAFT BANNER */
.draft-banner{display:none;background:var(--gold-bg);border:1px solid var(--gold-light);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;flex-direction:row;align-items:center;justify-content:space-between;gap:12px;}
.draft-banner.show{display:flex;}
.draft-banner-text{font-size:13px;color:var(--text2);}
.draft-banner-text strong{color:var(--gold);}

/* AUTOSAVE */
.autosave-indicator{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;}
.autosave-indicator.saved{color:var(--green);} .autosave-indicator.saving{color:var(--gold);}
.autosave-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.badge-gold{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-light);}

/* PREVIEW MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;}
.modal-overlay.show{display:flex;}
.preview-modal{background:#fff;border-radius:16px;width:100%;max-width:700px;margin:auto;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.preview-modal-header{background:var(--surface3);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.preview-modal-title{font-family:'Playfair Display',serif;font-size:17px;color:var(--gold);}
.preview-modal-actions{display:flex;gap:8px;}

/* PREVIEW DOC */
.preview-letterhead{background:#1a1209;padding:20px 28px;display:flex;justify-content:space-between;align-items:flex-start;}
.preview-lh-name{font-family:'Playfair Display',serif;font-size:22px;color:#c9a84c;letter-spacing:.5px;}
.preview-lh-sub{font-size:11px;color:#a08050;margin-top:3px;}
.preview-lh-qno{font-family:'DM Mono',monospace;font-size:14px;color:#c9a84c;font-weight:600;}
.preview-lh-date{font-size:11px;color:#a08050;margin-top:3px;}
.preview-lh-right{text-align:right;}
.preview-customer-bar{background:#fdf8ef;border-bottom:1px solid #e8dcc8;padding:12px 28px;display:flex;justify-content:space-between;align-items:center;}
.preview-cust-label{font-size:10px;color:#9e8460;text-transform:uppercase;letter-spacing:.8px;}
.preview-cust-name{font-size:15px;font-weight:600;color:#2a1f0e;margin-top:2px;}
.preview-cust-meta{font-size:11px;color:#9e8460;margin-top:2px;}
.preview-items{padding:16px 28px;}
.preview-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.preview-tbl thead tr{background:#f5efe0;}
.preview-tbl thead th{padding:7px 8px;text-align:left;font-size:10px;font-weight:600;color:#9e8460;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid #e2d9c8;}
.preview-tbl thead th:last-child{text-align:right;}
.preview-tbl .item-header-row td{background:#f0e8d0;padding:6px 8px;font-weight:600;color:#2a1f0e;border-bottom:1px solid #e2d9c8;}
.preview-tbl .item-info-row td{padding:5px 8px;color:#6b5535;border-bottom:1px solid #f0ebe0;vertical-align:top;}
.preview-tbl .item-photo-row td{padding:6px 8px 10px;border-bottom:1px solid #e8dcc8;}
.preview-tbl .item-cost-row td{padding:4px 8px;border-bottom:1px solid #f5f0e8;font-size:12px;}
.preview-tbl td:last-child{text-align:right;}
.preview-photo-strip{display:flex;gap:5px;flex-wrap:wrap;}
.preview-photo-strip img{width:50px;height:50px;object-fit:cover;border-radius:5px;border:1px solid #e2d9c8;}
.preview-totals{padding:0 28px 20px;display:flex;justify-content:flex-end;}
.preview-totals-box{width:260px;border:1px solid #e2d9c8;border-radius:8px;overflow:hidden;}
.preview-totals-row{display:flex;justify-content:space-between;padding:6px 12px;font-size:12px;border-bottom:1px solid #f0ebe0;background:#fdf8ef;}
.preview-totals-row .lbl{color:#6b5535;} .preview-totals-row .val{font-family:'DM Mono',monospace;color:#2a1f0e;}
.preview-grand-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1a1209;}
.preview-grand-row .lbl{font-family:'Playfair Display',serif;font-size:14px;color:#c9a84c;}
.preview-grand-row .val{font-family:'DM Mono',monospace;font-size:17px;color:#e2c068;font-weight:600;}
.preview-terms{padding:12px 28px 20px;font-size:11px;color:#9e8460;line-height:1.7;border-top:1px solid #e8dcc8;}

/* INSTALL / OFFLINE / LOADING / TOAST */
.install-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;flex-direction:row;align-items:center;justify-content:space-between;gap:12px;z-index:400;}
.install-banner.show{display:flex;}
.install-banner-text{font-size:13px;color:var(--text2);}
.install-banner-text strong{color:var(--text);}
.offline-banner{display:none;background:#fff3e0;color:#8a5020;text-align:center;padding:5px;font-size:12px;border-bottom:1px solid #f0c080;}
.offline-banner.show{display:block;}
.loading-overlay{position:fixed;inset:0;background:rgba(245,240,232,.7);display:none;align-items:center;justify-content:center;z-index:9998;}
.loading-overlay.show{display:flex;}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#2a1f0e;color:#f5f0e8;padding:10px 20px;border-radius:24px;font-size:13px;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .form-row{grid-template-columns:1fr;} .form-row.three{grid-template-columns:1fr 1fr;}
  .item-row1{grid-template-columns:1fr;}
  .item-row2{grid-template-columns:1fr 1fr;}
  .view-table-header,.view-row-top{grid-template-columns:24px 1fr 70px 40px 70px;}
  .builder-actions{flex-direction:column;} .pin-card{width:calc(100% - 40px);}
  .preview-letterhead,.preview-customer-bar,.preview-items,.preview-totals,.preview-terms{padding-left:16px;padding-right:16px;}
  .quote-card{flex-direction:column;align-items:flex-start;gap:6px;}
  .quote-card-right{text-align:left;width:100%;display:flex;justify-content:space-between;align-items:baseline;}
  .quote-card-items{text-align:left;}
  .calc-bar{gap:6px 10px;}
  .calc-chip{font-size:11px;}
  .header-actions{gap:6px;}
  .btn{padding:7px 12px;font-size:12.5px;}
  .app-header{padding:0 12px;}
  .list-body,.builder-body,.view-body{padding:12px;}
  .section-card,.totals-card{padding:14px;}
  .photo-thumb,.photo-add-btn{width:56px;height:56px;}
}
@media(max-width:420px){
  .item-row2{grid-template-columns:1fr;}
  .header-logo{font-size:16px;}
  .version-tag{display:none;}
  .view-actions{flex-wrap:wrap;gap:6px;}
  .modal-overlay{padding:0;}
  .preview-modal{border-radius:0;min-height:100vh;}
  .preview-modal-header{flex-wrap:wrap;gap:8px;padding:12px 14px;}
  .preview-modal-actions{flex-wrap:wrap;width:100%;}
}
</style>
</head>
<body>

<div class="offline-banner" id="offline-banner">📡 You are offline — viewing cached data</div>

<!-- PIN -->
<div id="pin-screen" class="screen active">
  <div class="pin-card">
    <div class="pin-logo">LathePro</div>
    <div class="pin-sub">Amar Furniture</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key" onclick="pinSubmit()">✓</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<!-- LIST -->
<div id="list-screen" class="screen">
  <div class="app-header">
    <div><div class="header-logo">LathePro</div><div class="version-tag">v1.0.11</div></div>
    <div class="header-actions">
      <button class="btn btn-gold" onclick="newQuote()">+ New Quote</button>
      <button class="btn btn-outline btn-icon" onclick="lockApp()">🔒</button>
    </div>
  </div>
  <div class="list-body">
    <div class="list-top">
      <div class="list-title">Quotes</div>
      <div id="quotes-count" style="font-size:12px;color:var(--text3);"></div>
    </div>
    <div id="quotes-list"></div>

<!-- BUILDER -->
<div id="builder-screen" class="screen">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn btn-outline btn-icon" onclick="goList()">←</button>
      <div><div class="header-logo" style="font-size:17px;">LathePro</div><div class="version-tag">v1.0.11</div></div>
    </div>
    <div class="header-actions">
      <div class="autosave-indicator" id="autosave-indicator"><div class="autosave-dot"></div><span id="autosave-text">draft</span></div>
      <span id="builder-quote-num" class="badge badge-gold"></span>
      <button class="btn btn-gold" onclick="saveQuote()">💾 Save</button>
    </div>
  </div>

  <div class="builder-body" id="builder-body-grid">
    <div class="builder-main">
      <div class="draft-banner" id="draft-banner">
        <div class="draft-banner-text">📝 <strong>Unsaved draft found.</strong> Restore it?</div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-gold btn-sm" onclick="restoreDraft()">Restore</button>
          <button class="btn btn-outline btn-sm" onclick="discardDraft()">Discard</button>
        </div>
      </div>

      <div class="section-card">
        <div class="section-title">Customer Details</div>
        <div class="form-row">
          <div class="form-group"><label>Customer Name *</label><input type="text" id="cust-name" list="customer-names-list" placeholder="e.g. Rajesh Sharma" oninput="onCustomerNameInput(this.value)" autocomplete="off"><datalist id="customer-names-list"></datalist></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="cust-phone" list="customer-phones-list" placeholder="+91 00000 00000" oninput="onCustomerPhoneInput(this.value)" autocomplete="off"><datalist id="customer-phones-list"></datalist></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" id="quote-date"></div>
          <div class="form-group"><label>Delivery Date</label><input type="date" id="delivery-date"></div>
        </div>
        <div class="form-row full">
          <div class="form-group"><label>Address / Notes</label><textarea id="cust-address" placeholder="Customer address or project notes..."></textarea></div>
        </div>
      </div>

      <div class="section-divider"><span>Lathe Items</span></div>
      <div id="items-container"></div>
      <button class="btn btn-outline" style="width:100%;margin-bottom:12px;" onclick="addItem()">+ Add Item</button>
    </div>

    <div class="builder-sidebar">
      <div class="builder-sidebar-sticky">
        <div class="totals-card">
          <div class="section-title" style="margin-bottom:10px;">Summary</div>
          <div style="margin-bottom:10px;">
            <div style="font-size:10px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;font-weight:600;margin-bottom:6px;">Discount</div>
            <div class="discount-toggle">
              <button class="disc-type-btn active" id="disc-flat-btn" onclick="setDiscType('flat')">₹ Flat</button>
              <button class="disc-type-btn" id="disc-pct-btn" onclick="setDiscType('pct')">% Percent</button>
            </div>
            <input type="number" id="discount-val" placeholder="0" min="0" oninput="recalcTotals()" style="width:160px;">
          </div>
          <div id="totals-breakdown"></div>
        </div>

        <div class="section-card">
          <div class="section-title">Terms & Conditions</div>
          <textarea id="terms-text" style="min-height:80px;">1. GST will be charged extra as applicable.
2. 50% advance required before work commencement.
3. Delivery subject to material availability.
4. Prices valid for 15 days from quote date.</textarea>
        </div>

        <div class="builder-actions">
          <button class="btn btn-gold" onclick="saveQuote()" style="flex:1;">💾 Save</button>
          <button class="btn btn-outline" onclick="showPreview('quote')" style="flex:1;">👁 Preview & PDF</button>
          <button class="btn btn-outline" onclick="showPreview('job')" style="flex:1;">🔧 Job Sheet</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore,collection,addDoc,getDocs,doc,updateDoc,deleteDoc,query,orderBy,getDoc,setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig={apiKey:"AIzaSyARVv1P0ssuKzfpS1M59AB-rG3riIWh-2c",authDomain:"amar-furniture-e4782.firebaseapp.com",projectId:"amar-furniture-e4782",storageBucket:"amar-furniture-e4782.firebasestorage.app",messagingSenderId:"1084205045390",appId:"1:1084205045390:web:e3c782b318e872629c5bdf"};
const APP_VERSION='1.0.11',DRAFT_KEY='lathepro_draft',DRAFT_DISMISS_KEY='lathepro_install_dismissed';
const PIN="1234",WOOD_TYPES=["Teak","Khair","Sagwan","Mango","Sheesham","Other"];
const DEFAULT_WOOD_RATE=5500,DEFAULT_LATHE_RATE=100;
const app=initializeApp(firebaseConfig),db=getFirestore(app);
let currentQuote=null,editingQuoteId=null,items=[],discountType='flat',quotesCache=[],_previewMode='quote';

// globals
['pinKey','pinDel','pinSubmit','lockApp','newQuote','goList','addItem','removeItem','calcItem',
 'recalcTotals','setDiscType','saveQuote','openQuote','editCurrentQuote','deleteCurrentQuote',
 'generateQuotePDF','generateJobSheet','shareWhatsApp','addPhotos','removePhoto',
 'showPreview','closePreview','downloadCurrentPreview','installApp','dismissInstall',
 'restoreDraft','discardDraft'].forEach(fn=>window[fn]=eval(fn));

// PIN
let pinEntry='';
function pinKey(d){if(pinEntry.length>=4)return;pinEntry+=d;updateDots();if(pinEntry.length===4)setTimeout(pinSubmit,150);}
function pinDel(){pinEntry=pinEntry.slice(0,-1);updateDots();document.getElementById('pin-error').textContent='';}
function pinSubmit(){if(pinEntry===PIN){showScreen('list');loadQuotes();loadCustomers();}else{document.getElementById('pin-error').textContent='Incorrect PIN. Try again.';pinEntry='';updateDots();}}
function updateDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length);}
function lockApp(){pinEntry='';updateDots();document.getElementById('pin-error').textContent='';showScreen('pin');}
document.addEventListener('keydown',e=>{if(!document.getElementById('pin-screen').classList.contains('active'))return;if(e.key>='0'&&e.key<='9')pinKey(e.key);else if(e.key==='Backspace'||e.key==='Delete')pinDel();else if(e.key==='Enter')pinSubmit();});

// NAV
function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(n+'-screen').classList.add('active');}
function goList(){if(document.getElementById('builder-screen').classList.contains('active'))saveDraftToLocal();showScreen('list');loadQuotes();}

// LIST
async function loadQuotes(){showLoading(true);try{const q=query(collection(db,'lathepro_quotes'),orderBy('createdAt','desc'));const snap=await getDocs(q);quotesCache=snap.docs.map(d=>({id:d.id,...d.data()}));renderList();}catch(e){toast('Error loading quotes');}showLoading(false);}

// ── CUSTOMERS (reuse / autocomplete) ──
let customersCache=[];
async function loadCustomers(){
  try{
    const snap=await getDocs(collection(db,'lathepro_customers'));
    customersCache=snap.docs.map(d=>({id:d.id,...d.data()}));
    refreshCustomerDatalists();
  }catch(e){console.warn('Could not load customers',e);}
}
function refreshCustomerDatalists(){
  const nameList=document.getElementById('customer-names-list');
  const phoneList=document.getElementById('customer-phones-list');
  if(nameList)nameList.innerHTML=customersCache.map(c=>`<option value="${(c.name||'').replace(/"/g,'&quot;')}">`).join('');
  if(phoneList)phoneList.innerHTML=customersCache.map(c=>`<option value="${(c.phone||'').replace(/"/g,'&quot;')}">`).join('');
}
function onCustomerNameInput(val){
  const match=customersCache.find(c=>(c.name||'').toLowerCase()===val.trim().toLowerCase());
  if(match)fillCustomerFields(match);
}
function onCustomerPhoneInput(val){
  const match=customersCache.find(c=>(c.phone||'').trim()===val.trim());
  if(match)fillCustomerFields(match);
}
function fillCustomerFields(c){
  document.getElementById('cust-name').value=c.name||'';
  document.getElementById('cust-phone').value=c.phone||'';
  if(c.address)document.getElementById('cust-address').value=c.address;
  triggerAutoSave&&triggerAutoSave();
}
async function upsertCustomer(name,phone,address){
  if(!name)return;
  // Use phone as the doc id when present (most reliable unique key), else fallback to slugified name
  const id=phone&&phone.trim()?phone.trim().replace(/[^0-9+]/g,''):name.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-');
  if(!id)return;
  try{
    await setDoc(doc(db,'lathepro_customers',id),{name:name.trim(),phone:(phone||'').trim(),address:(address||'').trim(),updatedAt:new Date().toISOString()},{merge:true});
    // refresh local cache so autocomplete is current without a full reload
    const idx=customersCache.findIndex(c=>c.id===id);
    const rec={id,name:name.trim(),phone:(phone||'').trim(),address:(address||'').trim()};
    if(idx>=0)customersCache[idx]=rec;else customersCache.push(rec);
    refreshCustomerDatalists();
  }catch(e){console.warn('Could not save customer',e);}
}
function renderList(){const el=document.getElementById('quotes-list'),cnt=document.getElementById('quotes-count');cnt.textContent=quotesCache.length+' quote'+(quotesCache.length!==1?'s':'');if(!quotesCache.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🪵</div><div class="empty-title">No quotes yet</div><div>Create your first lathe work quote</div></div>`;return;}el.innerHTML=quotesCache.map(q=>`<div class="quote-card" onclick="openQuote('${q.id}')"><div><div class="quote-card-num">${q.quoteNo}</div><div class="quote-card-name">${q.customerName}</div><div class="quote-card-date">${formatDate(q.date)}</div></div><div><div class="quote-card-amount">₹${fmt(q.grandTotal||0)}</div><div class="quote-card-items">${(q.items||[]).length} item${(q.items||[]).length!==1?'s':''}</div></div></div>`).join('');}

// BUILDER
let itemIdCounter=0;
function newQuote(){editingQuoteId=null;items=[];discountType='flat';['cust-name','cust-phone','cust-address','discount-val'].forEach(id=>document.getElementById(id).value='');document.getElementById('quote-date').value=todayStr();document.getElementById('delivery-date').value='';document.getElementById('terms-text').value=`1. GST will be charged extra as applicable.\n2. 50% advance required before work commencement.\n3. Delivery subject to material availability.\n4. Prices valid for 15 days from quote date.`;setDiscType('flat');document.getElementById('items-container').innerHTML='';getNextQuoteNo().then(no=>{document.getElementById('builder-quote-num').textContent=no;window._pendingQuoteNo=no;});const draft=checkForDraft();if(draft&&!draft.editingId){document.getElementById('draft-banner').classList.add('show');addItem();}else{document.getElementById('draft-banner').classList.remove('show');addItem();}setAutosaveStatus('idle');showScreen('builder');}
async function getNextQuoteNo(){try{const q=query(collection(db,'lathepro_quotes'),orderBy('quoteNo','desc'));const snap=await getDocs(q);if(snap.empty)return'LP-001';const last=snap.docs[0].data().quoteNo||'LP-000';return'LP-'+String(parseInt(last.replace('LP-',''))+1).padStart(3,'0');}catch{return'LP-'+Date.now().toString().slice(-4);}}

function addItem(){const id=++itemIdCounter;items.push({id,name:'',woodType:'Teak',length:'',width:'',thickness:'',qty:1,woodRate:DEFAULT_WOOD_RATE,latheRate:DEFAULT_LATHE_RATE,notes:'',internalNotes:'',photos:[]});renderItems();}
function removeItem(id){items=items.filter(i=>i.id!==id);renderItems();recalcTotals();}
function renderItems(){document.getElementById('items-container').innerHTML=items.map((item,idx)=>renderItemCard(item,idx)).join('');}

function renderItemCard(item,idx){
  const thumbs=item.photos.map((p,pi)=>`<div class="photo-wrap"><img src="${p}" alt="ref"><button class="photo-remove" onclick="removePhoto(${item.id},${pi})">×</button></div>`).join('');
  return `<div class="item-card" id="item-card-${item.id}">
  <div class="item-card-header">
    <div class="item-num">ITEM ${String(idx+1).padStart(2,'0')}</div>
    <div style="display:flex;gap:6px;align-items:center;">
      <select onchange="updateItem(${item.id},'woodType',this.value)" style="font-size:12px;padding:4px 8px;width:100px;">${WOOD_TYPES.map(w=>`<option ${item.woodType===w?'selected':''}>${w}</option>`).join('')}</select>
      ${items.length>1?`<button class="btn btn-danger btn-sm btn-icon" onclick="removeItem(${item.id})">×</button>`:''}
    </div>
  </div>
  <div class="item-card-body">
    <div class="item-row1">
      <div class="form-group"><label>Description *</label><input type="text" placeholder="e.g. Sofa Legs, Table Pillar..." value="${item.name}" oninput="updateItem(${item.id},'name',this.value)"></div>
      <div class="form-group"><label>Qty (pcs)</label><input type="number" placeholder="1" min="1" value="${item.qty||1}" oninput="updateItem(${item.id},'qty',this.value)"></div>
    </div>
    <div class="item-row2">
      <div class="form-group"><label>Length (in)</label><input type="number" placeholder="36" min="0" step="0.5" value="${item.length||''}" oninput="updateItem(${item.id},'length',this.value)"></div>
      <div class="form-group"><label>Width (in)</label><input type="number" placeholder="6" min="0" step="0.5" value="${item.width||''}" oninput="updateItem(${item.id},'width',this.value)"></div>
      <div class="form-group"><label>Thickness (in)</label><input type="number" placeholder="6" min="0" step="0.5" value="${item.thickness||''}" oninput="updateItem(${item.id},'thickness',this.value)"></div>
      <div class="form-group"><label>Wood ₹/CFT</label><input type="number" placeholder="${DEFAULT_WOOD_RATE}" value="${item.woodRate||DEFAULT_WOOD_RATE}" oninput="updateItem(${item.id},'woodRate',this.value)"></div>
      <div class="form-group"><label>Lathe ₹/ft×in</label><input type="number" placeholder="${DEFAULT_LATHE_RATE}" value="${item.latheRate||DEFAULT_LATHE_RATE}" oninput="updateItem(${item.id},'latheRate',this.value)"></div>
    </div>
    <div class="calc-bar" id="calc-${item.id}">
      <div class="calc-chip"><span class="calc-chip-label">CFT</span><span class="calc-chip-val" id="cft-${item.id}">—</span></div>
      <div class="calc-dv"></div>
      <div class="calc-chip"><span class="calc-chip-label">Wood/pc</span><span class="calc-chip-val" id="wood-pc-${item.id}">—</span></div>
      <div class="calc-dv"></div>
      <div class="calc-chip"><span class="calc-chip-label">Lathe ₹/ft×in</span><span class="calc-chip-val" id="lathe-pc-${item.id}">—</span></div>
      <div class="calc-dv"></div>
      <div class="calc-chip"><span class="calc-chip-label" id="ql-wood-${item.id}">Wood×${item.qty||1}</span><span class="calc-chip-val" id="wood-total-${item.id}">—</span></div>
      <div class="calc-dv"></div>
      <div class="calc-chip"><span class="calc-chip-label" id="ql-lathe-${item.id}">Lathe×${item.qty||1}</span><span class="calc-chip-val" id="lathe-total-${item.id}">—</span></div>
      <div class="calc-dv"></div>
      <div class="calc-chip"><span class="calc-chip-label">Total</span><span class="calc-chip-val calc-chip-total" id="item-total-${item.id}">—</span></div>
    </div>
    <div style="margin-bottom:8px;">
      <div class="form-group"><label>Notes <span style="color:var(--text3);font-weight:400;">(visible on quote)</span></label><input type="text" placeholder="Special instructions for client..." value="${item.notes}" oninput="updateItem(${item.id},'notes',this.value)"></div>
    </div>
    <div style="margin-bottom:8px;">
      <div class="form-group"><label style="color:#b05a1a;">🔒 Internal Notes <span style="font-weight:400;color:var(--text3);">(job sheet only — not shown to client)</span></label><input type="text" placeholder="Workshop instructions, measurements, reminders..." value="${item.internalNotes||''}" oninput="updateItem(${item.id},'internalNotes',this.value)" style="border-color:#f0c080;background:#fffbf0;"></div>
    </div>
    <div class="photos-row" id="photos-grid-${item.id}">
      ${thumbs}
      <label class="photo-add-btn" for="photo-input-${item.id}">+</label>
      <input type="file" id="photo-input-${item.id}" accept="image/*" multiple style="display:none" onchange="addPhotos(${item.id},this)">
    </div>
  </div>
</div>`;}

function updateItem(id,field,value){const item=items.find(i=>i.id===id);if(!item)return;item[field]=['qty','woodRate','latheRate','length','width','thickness'].includes(field)?parseFloat(value)||0:value;calcItem(id);}

function calcItem(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  const card=document.getElementById(`item-card-${id}`);
  if(card){
    // Sync name and internalNotes from text inputs
    const textInps=card.querySelectorAll('input[type="text"]');
    if(textInps[0])item.name=textInps[0].value;
    if(textInps[2])item.internalNotes=textInps[2].value; // [0]=name,[1]=notes,[2]=internalNotes
    // Sync numeric fields by index
    const inp=card.querySelectorAll('input[type="number"]');
    if(inp.length>=6){item.qty=parseInt(inp[0].value)||1;item.length=parseFloat(inp[1].value)||0;item.width=parseFloat(inp[2].value)||0;item.thickness=parseFloat(inp[3].value)||0;item.woodRate=inp[4].value===''?DEFAULT_WOOD_RATE:parseFloat(inp[4].value);item.latheRate=inp[5].value===''?DEFAULT_LATHE_RATE:parseFloat(inp[5].value);}
  }
  const L=item.length||0,W=item.width||0,T=item.thickness||0,qty=item.qty||1;
  const wR=(item.woodRate===''||item.woodRate==null)?DEFAULT_WOOD_RATE:item.woodRate;
  const lR=(item.latheRate===''||item.latheRate==null)?DEFAULT_LATHE_RATE:item.latheRate;
  // CFT = L(in)×W(in)×T(in)÷1728
  // Lathe = (L÷12)(ft) × W(in) × Rate
  const cft=L*W*T/1728,woodPerPc=cft*wR,lathePerPc=(L/12)*W*lR,woodTotal=woodPerPc*qty,latheTotal=lathePerPc*qty,itemTotal=woodTotal+latheTotal;
  item._cft=cft;item._woodPerPc=woodPerPc;item._lathePerPc=lathePerPc;item._woodTotal=woodTotal;item._latheTotal=latheTotal;item._itemTotal=itemTotal;
  const el=s=>document.getElementById(s);
  if(el(`cft-${id}`))el(`cft-${id}`).textContent=cft.toFixed(4);
  if(el(`wood-pc-${id}`))el(`wood-pc-${id}`).textContent='₹'+fmt(woodPerPc);
  if(el(`lathe-pc-${id}`))el(`lathe-pc-${id}`).textContent='₹'+fmt(lathePerPc);
  if(el(`wood-total-${id}`))el(`wood-total-${id}`).textContent='₹'+fmt(woodTotal);
  if(el(`lathe-total-${id}`))el(`lathe-total-${id}`).textContent='₹'+fmt(latheTotal);
  if(el(`item-total-${id}`))el(`item-total-${id}`).textContent='₹'+fmt(itemTotal);
  if(el(`ql-wood-${id}`))el(`ql-wood-${id}`).textContent=`Wood×${qty}`;
  if(el(`ql-lathe-${id}`))el(`ql-lathe-${id}`).textContent=`Lathe×${qty}`;
  recalcTotals();
}

function recalcTotals(){
  const sW=items.reduce((a,i)=>a+(i._woodTotal||0),0),sL=items.reduce((a,i)=>a+(i._latheTotal||0),0),sub=sW+sL;
  const dv=parseFloat(document.getElementById('discount-val')?.value)||0;
  const da=discountType==='flat'?dv:sub*dv/100,grand=Math.max(0,sub-da);
  document.getElementById('totals-breakdown').innerHTML=`<div class="totals-row"><span class="lbl">Wood Subtotal</span><span class="val">₹${fmt(sW)}</span></div><div class="totals-row"><span class="lbl">Lathe Subtotal</span><span class="val">₹${fmt(sL)}</span></div><div class="totals-row"><span class="lbl">Subtotal</span><span class="val">₹${fmt(sub)}</span></div>${da>0?`<div class="totals-row"><span class="lbl">Discount${discountType==='pct'?` (${dv}%)`:''}</span><span class="val" style="color:var(--red);">−₹${fmt(da)}</span></div>`:''}<div class="totals-grand"><span class="lbl">Grand Total</span><span class="val">₹${fmt(grand)}</span></div>`;
  return{subtotalWood:sW,subtotalLathe:sL,subtotal:sub,discAmount:da,grandTotal:grand};
}
function setDiscType(type){discountType=type;document.getElementById('disc-flat-btn').classList.toggle('active',type==='flat');document.getElementById('disc-pct-btn').classList.toggle('active',type==='pct');recalcTotals();}

// PHOTOS
function addPhotos(itemId,input){const item=items.find(i=>i.id===itemId);if(!item)return;let loaded=0;Array.from(input.files).forEach(file=>{const r=new FileReader();r.onload=e=>{item.photos.push(e.target.result);if(++loaded===input.files.length)refreshPhotosGrid(itemId);};r.readAsDataURL(file);});}
function removePhoto(itemId,idx){const item=items.find(i=>i.id===itemId);if(!item)return;item.photos.splice(idx,1);refreshPhotosGrid(itemId);}
function refreshPhotosGrid(itemId){const item=items.find(i=>i.id===itemId);if(!item)return;const grid=document.getElementById(`photos-grid-${itemId}`);if(!grid)return;grid.innerHTML=item.photos.map((p,pi)=>`<div class="photo-wrap"><img src="${p}" alt="ref"><button class="photo-remove" onclick="removePhoto(${itemId},${pi})">×</button></div>`).join('')+`<label class="photo-add-btn" for="photo-input-${itemId}">+</label><input type="file" id="photo-input-${itemId}" accept="image/*" multiple style="display:none" onchange="addPhotos(${itemId},this)">`;}

// SAVE
async function saveQuote(){
  const custName=document.getElementById('cust-name').value.trim();
  if(!custName){toast('Please enter customer name');return;}
  if(!items.length){toast('Please add at least one item');return;}
  items.forEach(it=>calcItem(it.id));const totals=recalcTotals();
  const discVal=parseFloat(document.getElementById('discount-val').value)||0;
  const quoteData={quoteNo:window._pendingQuoteNo||editingQuoteId,customerName:custName,phone:document.getElementById('cust-phone').value.trim(),address:document.getElementById('cust-address').value.trim(),date:document.getElementById('quote-date').value,deliveryDate:document.getElementById('delivery-date').value,terms:document.getElementById('terms-text').value,discountType,discountVal:discVal,discountAmount:totals.discAmount,subtotalWood:totals.subtotalWood,subtotalLathe:totals.subtotalLathe,subtotal:totals.subtotal,grandTotal:totals.grandTotal,
    items:items.map(it=>({id:it.id,name:it.name,woodType:it.woodType,length:it.length,width:it.width,thickness:it.thickness,qty:it.qty,woodRate:it.woodRate,latheRate:it.latheRate,notes:it.notes,internalNotes:it.internalNotes||'',photos:it.photos,_cft:it._cft||0,_woodPerPc:it._woodPerPc||0,_lathePerPc:it._lathePerPc||0,_woodTotal:it._woodTotal||0,_latheTotal:it._latheTotal||0,_itemTotal:it._itemTotal||0})),
    createdAt:editingQuoteId?undefined:new Date().toISOString(),updatedAt:new Date().toISOString()};
  showLoading(true);
  try{if(editingQuoteId){await updateDoc(doc(db,'lathepro_quotes',editingQuoteId),quoteData);currentQuote={id:editingQuoteId,...quoteData};clearDraft();setAutosaveStatus('idle');toast('Quote updated ✓');}else{quoteData.quoteNo=window._pendingQuoteNo;const ref=await addDoc(collection(db,'lathepro_quotes'),quoteData);editingQuoteId=ref.id;currentQuote={id:ref.id,...quoteData};clearDraft();setAutosaveStatus('idle');toast('Quote saved ✓');}
    upsertCustomer(quoteData.customerName,quoteData.phone,quoteData.address); // fire-and-forget, doesn't block save
  }catch(e){toast('Error saving: '+e.message);}showLoading(false);
}

// PDF - QUOTE (compact)
async function generateQuotePDF(){
  if(document.getElementById('builder-screen').classList.contains('active'))await saveQuote();
  const quote=currentQuote;if(!quote)return;
  showLoading(true);
  try{
    const{jsPDF}=window.jspdf;const pdf=new jsPDF({unit:'mm',format:'a4'});const W=210,M=14;let y=0;
    // Header

    pdf.setTextColor(201,168,76);pdf.setFont('helvetica','bold');pdf.setFontSize(12);pdf.text(quote.quoteNo,W-M,12,{align:'right'});
    pdf.setFont('helvetica','normal');pdf.setFontSize(7.5);pdf.setTextColor(160,130,80);

    pdf.setFillColor(253,248,239);pdf.rect(M,y,W-M*2,12,'F');pdf.setDrawColor(226,217,200);pdf.rect(M,y,W-M*2,12,'S');
    pdf.setTextColor(100,80,40);pdf.setFont('helvetica','bold');pdf.setFontSize(7.5);pdf.text('BILL TO',M+2,y+4.5);
    pdf.setFont('helvetica','normal');pdf.setFontSize(9.5);pdf.setTextColor(42,31,14);pdf.text(quote.customerName,M+2,y+9.5);
    if(quote.phone)pdf.text(quote.phone,W-M-2,y+9.5,{align:'right'});
    if(quote.address)pdf.text(quote.address.substring(0,80),M+2,y+13.5);
    y+=17;
    // Table header
    const cols=[M,M+52,M+90,M+110,M+128,M+152,M+170],tW=W-M*2;
    pdf.setFillColor(240,234,220);pdf.rect(M,y,tW,6.5,'F');
    pdf.setTextColor(100,80,40);pdf.setFont('helvetica','bold');pdf.setFontSize(7);
    ['Item / Description','Dimensions','CFT','Qty','Wood Amt','Lathe Amt','Total'].forEach((h,ci)=>pdf.text(h,cols[ci]+1,y+4.5));

    for(let i=0;i<quote.items.length;i++){
      const item=quote.items[i],hasP=item.photos&&item.photos.length>0,pS=18,pH=hasP?pS+3:0,rH=13+pH;

      // Photos inline on left
      if(hasP){const maxP=Math.min(item.photos.length,3);for(let pi=0;pi<maxP;pi++){try{pdf.addImage(item.photos[pi],'JPEG',M+1+pi*(pS+1),y+1,pS,pS);}catch{}}}
      const tx=hasP?M+1+3*(pS+1)+2:M+2;
      // Item name + wood type
      pdf.setTextColor(42,31,14);pdf.setFont('helvetica','bold');pdf.setFontSize(8.5);
      pdf.text(`${String(i+1).padStart(2,'0')}. ${item.name||'(no description)'}`,tx,y+(hasP?pH/2+1:5));
      pdf.setFont('helvetica','normal');pdf.setFontSize(7);pdf.setTextColor(120,90,50);
      pdf.text(item.woodType,tx,y+(hasP?pH/2+5.5:9.5));
      // Data columns
      const mY=y+(hasP?pH/2+3:6.5);
      pdf.setTextColor(42,31,14);pdf.setFont('helvetica','normal');pdf.setFontSize(7.5);
      pdf.text(`${item.length}"x${item.width}"x${item.thickness}"`,cols[1]+1,mY);
      pdf.text((item._cft||0).toFixed(3),cols[2]+1,mY);
      pdf.text(String(item.qty)+'pcs',cols[3]+1,mY);
      pdf.text(pdfFmt(item._woodTotal||0),cols[4]+1,mY);

    pdf.text('Grand Total',tx2+2,y+6.2);pdf.text(pdfFmt(quote.grandTotal||0),tx2+tw-2,y+6.2,{align:'right'});y+=13;

    pdf.setFont('helvetica','normal');pdf.setFontSize(7);pdf.setTextColor(140,120,80);
    (quote.terms||'').split('\n').forEach(line=>{if(y>272){pdf.addPage();y=14;}pdf.text(line,M,y);y+=4;});
    // Footer
    pdf.setFillColor(26,18,9);pdf.rect(0,285,W,12,'F');pdf.setTextColor(120,100,60);pdf.setFontSize(7);pdf.text('LathePro by Amar Furniture - AppCentrik',W/2,292,{align:'center'});
    pdf.save(`${quote.quoteNo}_${quote.customerName.replace(/\s+/g,'_')}_Quote.pdf`);toast('PDF downloaded');
  }catch(e){toast('PDF error: '+e.message);console.error(e);}showLoading(false);
}

      pdf.text('QTY: '+item.qty+'pcs',W-M-2,y+4.8,{align:'right'});
      y+=9;
      if(hasP){const pS=22,maxP=Math.min(item.photos.length,4);for(let pi=0;pi<maxP;pi++){try{pdf.addImage(item.photos[pi],'JPEG',M+pi*(pS+3),y,pS,pS);}catch{}}y+=pS+4;}
      const cW=(W-M*2)/2;[{l:'Dimensions',v:item.length+'" x '+item.width+'" x '+item.thickness+'"'},{l:'Wood Type',v:item.woodType},{l:'CFT/piece',v:(item._cft||0).toFixed(4)},{l:'Quantity',v:item.qty+' pieces'}].forEach((s,si)=>{const cx=M+(si%2)*cW,ry=y+Math.floor(si/2)*7;pdf.setFillColor(si%4<2?250:244,si%4<2?248:242,si%4<2?240:232);pdf.rect(cx,ry,cW,7,'F');pdf.setTextColor(120,100,60);pdf.setFont('helvetica','normal');pdf.setFontSize(7.5);pdf.text(s.l+':',cx+2,ry+4.5);pdf.setTextColor(42,31,14);pdf.setFont('helvetica','bold');pdf.text(s.v,cx+cW/2,ry+4.5);});y+=14+3;
      if(item.notes){pdf.setFillColor(255,248,220);pdf.rect(M,y,W-M*2,7,'F');pdf.setTextColor(140,100,20);pdf.setFont('helvetica','bold');pdf.setFontSize(7);pdf.text('Special Instructions: ',M+2,y+3.5);pdf.setFont('helvetica','normal');pdf.text(item.notes,M+42,y+3.5);y+=9;}
      if(item.internalNotes){
        if(y+8>272){pdf.addPage();y=14;}
        pdf.setFillColor(255,248,235);pdf.rect(M,y,W-M*2,8,'F');
        pdf.setFillColor(176,90,26);pdf.rect(M,y,2,8,'F'); // orange left border
        pdf.setTextColor(176,90,26);pdf.setFont('helvetica','bold');pdf.setFontSize(7);
        pdf.text('INTERNAL NOTES:',M+4,y+3.5);
        pdf.setFont('helvetica','normal');pdf.setTextColor(80,40,10);
        pdf.text(item.internalNotes,M+38,y+3.5);
        y+=10;
      }
      y+=3;
    }
    if(quote.deliveryDate){if(y+12>272){pdf.addPage();y=14;}pdf.setFillColor(255,240,200);pdf.rect(M,y,W-M*2,9,'F');pdf.setTextColor(180,100,20);pdf.setFont('helvetica','bold');pdf.setFontSize(9.5);pdf.text('DEADLINE: '+formatDate(quote.deliveryDate),W/2,y+6.2,{align:'center'});y+=13;}
    if(y+22>272){pdf.addPage();y=14;}y+=6;
    pdf.setDrawColor(180,160,100);pdf.setLineWidth(0.3);pdf.line(M,y+14,M+60,y+14);pdf.line(W-M-60,y+14,W-M,y+14);pdf.setFontSize(7);pdf.setTextColor(140,120,80);pdf.text('Supervisor Signature',M,y+18);pdf.text('Worker Signature',W-M,y+18,{align:'right'});
    pdf.setFillColor(26,18,9);pdf.rect(0,285,W,12,'F');pdf.setTextColor(120,100,60);pdf.setFontSize(7);pdf.text('LathePro Job Sheet - Amar Furniture - Nashik',W/2,292,{align:'center'});
    pdf.save(quote.quoteNo+'_JobSheet.pdf');toast('Job Sheet downloaded');
  }catch(e){toast('Error: '+e.message);console.error(e);}showLoading(false);
}

// UTILS
function fmt(n){return Number(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2});}
function pdfFmt(n){
  // Use simple formatting for PDF — jsPDF helvetica can't handle en-IN locale chars
  const num=Number(n);
  const formatted=num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return 'Rs.'+formatted;
}
function todayStr(){return new Date().toISOString().split('T')[0];}
function formatDate(str){if(!str)return'';try{return new Date(str).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch{return str;}}
function showLoading(show){document.getElementById('loading').classList.toggle('show',show);}
let _tt;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000);}

// SW
if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').then(reg=>{reg.addEventListener('updatefound',()=>{const w=reg.installing;w.addEventListener('statechange',()=>{if(w.state==='installed'&&navigator.serviceWorker.controller){if(confirm('🔄 LathePro update available! Reload?')){w.postMessage({type:'SKIP_WAITING'});window.location.reload();}}});});}).catch(()=>{});let r=false;navigator.serviceWorker.addEventListener('controllerchange',()=>{if(!r){r=true;window.location.reload();}});});}

// ONLINE/OFFLINE
function updateOnlineStatus(){document.getElementById('offline-banner').classList.toggle('show',!navigator.onLine);}
window.addEventListener('online',updateOnlineStatus);window.addEventListener('offline',updateOnlineStatus);updateOnlineStatus();

// INSTALL
let _dip=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();_dip=e;if(!localStorage.getItem(DRAFT_DISMISS_KEY))setTimeout(()=>document.getElementById('install-banner').classList.add('show'),3000);});
function installApp(){if(!_dip)return;_dip.prompt();_dip.userChoice.then(()=>{_dip=null;document.getElementById('install-banner').classList.remove('show');});}
function dismissInstall(){document.getElementById('install-banner').classList.remove('show');localStorage.setItem(DRAFT_DISMISS_KEY,'1');}

// AUTOSAVE
let _ast=null;
function triggerAutoSave(){setAutosaveStatus('saving');clearTimeout(_ast);_ast=setTimeout(()=>{saveDraftToLocal();setAutosaveStatus('saved');setTimeout(()=>setAutosaveStatus('idle'),2000);},1200);}
function saveDraftToLocal(){try{items.forEach(it=>calcItem(it.id));localStorage.setItem(DRAFT_KEY,JSON.stringify({quoteNo:window._pendingQuoteNo,editingId:editingQuoteId,customerName:document.getElementById('cust-name').value,phone:document.getElementById('cust-phone').value,address:document.getElementById('cust-address').value,date:document.getElementById('quote-date').value,deliveryDate:document.getElementById('delivery-date').value,terms:document.getElementById('terms-text').value,discountType,discountVal:document.getElementById('discount-val').value,items:items.map(it=>({...it})),savedAt:new Date().toISOString()}));}catch(e){console.warn('Draft save failed',e);}}
function clearDraft(){localStorage.removeItem(DRAFT_KEY);}
function checkForDraft(){try{const d=JSON.parse(localStorage.getItem(DRAFT_KEY)||'null');return d&&(d.customerName||d.items?.length>0)?d:false;}catch{return false;}}
function restoreDraft(){try{const draft=JSON.parse(localStorage.getItem(DRAFT_KEY));if(!draft)return;window._pendingQuoteNo=draft.quoteNo;editingQuoteId=draft.editingId||null;document.getElementById('builder-quote-num').textContent=draft.quoteNo||'';document.getElementById('cust-name').value=draft.customerName||'';document.getElementById('cust-phone').value=draft.phone||'';document.getElementById('cust-address').value=draft.address||'';document.getElementById('quote-date').value=draft.date||todayStr();document.getElementById('delivery-date').value=draft.deliveryDate||'';document.getElementById('terms-text').value=draft.terms||'';document.getElementById('discount-val').value=draft.discountVal||'';setDiscType(draft.discountType||'flat');itemIdCounter=0;items=(draft.items||[]).map(it=>({...it,id:++itemIdCounter}));renderItems();items.forEach(it=>calcItem(it.id));recalcTotals();document.getElementById('draft-banner').classList.remove('show');toast('Draft restored ✓');}catch(e){toast('Could not restore draft');}}
function discardDraft(){clearDraft();document.getElementById('draft-banner').classList.remove('show');}
function setAutosaveStatus(status){const el=document.getElementById('autosave-indicator'),txt=document.getElementById('autosave-text');if(!el)return;el.className='autosave-indicator '+(status!=='idle'?status:'');txt.textContent=status==='saving'?'saving…':status==='saved'?'draft saved':'draft';}

// INIT
document.getElementById('quote-date').value=todayStr();
document.getElementById('builder-screen').addEventListener('input',triggerAutoSave);
document.getElementById('builder-screen').addEventListener('change',triggerAutoSave);

});
